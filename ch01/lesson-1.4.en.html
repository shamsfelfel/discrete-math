window.LESSON_DATA = {
  "id": "1.4",
  "chapter": "1",
  "title": "Predicates and Quantifiers",
  "lede": "Propositional logic cannot say things like “every student passed” or “some integer is prime.” Predicates introduce variables that range over a domain, and quantifiers (∀ “for all,” ∃ “there exists”) bind those variables. Together they give us the language of mathematics.",
  "concepts": [
    {
      "id": "c1",
      "title": "Predicates and propositional functions",
      "body": [
        {
          "type": "p",
          "text": "An expression like “@x@ is greater than 3” is not yet a proposition — its truth value depends on what @x@ stands for. We call this a predicate, written @P(x)@. Once @x@ is given a specific value, @P(x)@ becomes a proposition with a definite truth value."
        },
        {
          "type": "def",
          "text": "A predicate (or propositional function) @P(x)@ assigns a truth value to each element @x@ in some domain. If we plug a value into @P@, we get a proposition. Predicates can have multiple arguments: @Q(x,y)@, @R(x,y,z)@, etc."
        },
        {
          "type": "p",
          "text": "The set of values @x@ can take is called the domain of discourse (or just the domain). The same predicate over different domains can have different truth values."
        }
      ],
      "examples": [
        {
          "label": "One-argument predicate",
          "body": "Let @P(x)@ = “@x@ > 3”. Then @P(4)@ is the proposition “4 > 3” (true) and @P(2)@ is “2 > 3” (false)."
        },
        {
          "label": "Two-argument predicate",
          "body": "Let @Q(x,y)@ = “@x@ + @y@ = 5”. @Q(2,3)@ is true; @Q(1,1)@ is false."
        }
      ]
    },
    {
      "id": "c2",
      "title": "The universal quantifier ∀",
      "body": [
        {
          "type": "def",
          "text": "The universal quantification of @P(x)@ is the statement “@P(x)@ for every @x@ in the domain,” written @∀x P(x)@. It is true when @P(a)@ is true for every element @a@ in the domain, and false if even one element makes @P@ false. Such an element is called a counterexample."
        },
        {
          "type": "p",
          "text": "Read @∀x@ as “for all @x@” or “for every @x@.” The domain MUST be specified (or be clear from context); the same statement can be true over one domain and false over another."
        }
      ],
      "examples": [
        {
          "label": "True over one domain, false over another",
          "body": "@∀x (x^2 ≥ 0)@ is true when the domain is the real numbers, but @∀x (x^2 > 0)@ is FALSE over the reals (counterexample: @x@ = 0)."
        },
        {
          "label": "Disproving with a counterexample",
          "body": "Claim: @∀n (n^2 > n)@ over positive integers. Counterexample: @n@ = 1, since @1^2 = 1@ is not greater than 1."
        }
      ]
    },
    {
      "id": "c3",
      "title": "The existential quantifier ∃",
      "body": [
        {
          "type": "def",
          "text": "The existential quantification of @P(x)@ is the statement “there exists an @x@ in the domain such that @P(x)@,” written @∃x P(x)@. It is true when @P(a)@ holds for at least one element @a@ in the domain, and false only when @P@ fails for every element."
        },
        {
          "type": "p",
          "text": "Read @∃x@ as “there is an @x@,” “there exists @x@,” or “for some @x@.” To prove @∃x P(x)@, exhibit one element @a@ such that @P(a)@ is true (this is a constructive proof of existence)."
        },
        {
          "type": "p",
          "text": "There is also the uniqueness quantifier @∃! x P(x)@, meaning “there exists exactly one @x@ such that @P(x)@.” It is shorthand for @∃x (P(x) ∧ ∀y (P(y) → y = x))@."
        }
      ],
      "examples": [
        {
          "label": "Witnessing existence",
          "body": "@∃x (x^2 = 2)@ over the real numbers is true, witnessed by @x = √2@. Over the rationals, the same statement is false — there is no rational @x@ with @x^2 = 2@."
        }
      ]
    },
    {
      "id": "c4",
      "title": "Truth values summary",
      "body": [
        {
          "type": "p",
          "text": "When the domain consists of @x_1, x_2, …, x_n@:"
        },
        {
          "type": "truthTable",
          "headers": [
            "Statement",
            "When true",
            "When false"
          ],
          "rows": [
            [
              "∀x P(x)",
              "P(x_i) true for every x_i",
              "P(x_i) false for some x_i"
            ],
            [
              "∃x P(x)",
              "P(x_i) true for some x_i",
              "P(x_i) false for every x_i"
            ]
          ]
        },
        {
          "type": "p",
          "text": "Mnemonic: ∀ acts like a big AND across the domain, and ∃ acts like a big OR. This intuition makes negation rules easy to remember."
        }
      ],
      "examples": [
        {
          "label": "Empty domain convention",
          "body": "@∀x P(x)@ over an empty domain is conventionally TRUE (vacuously — there are no counterexamples). @∃x P(x)@ over an empty domain is FALSE (there is nothing to witness it)."
        }
      ]
    },
    {
      "id": "c5",
      "title": "Free vs. bound variables; scope",
      "body": [
        {
          "type": "p",
          "text": "When a quantifier @∀x@ or @∃x@ is applied, every occurrence of @x@ within its scope becomes bound. Variables not bound by any quantifier or fixed value are called free."
        },
        {
          "type": "def",
          "text": "The scope of a quantifier is the part of the formula it applies to (often the immediately following parenthesized expression). All variables in a propositional function must be bound or assigned a value to turn it into a proposition."
        }
      ],
      "examples": [
        {
          "label": "Mixed binding",
          "body": "In @∃x(x + y = 1)@, @x@ is bound by @∃@ but @y@ is free. The whole expression is not yet a proposition; it depends on @y@."
        },
        {
          "label": "Disjoint scopes",
          "body": "@∃x(P(x) ∧ Q(x)) ∨ ∀x R(x)@ — the two @x@'s are different bound variables; renaming one to @y@ doesn't change the meaning."
        }
      ]

      "id": "c6",
      "title": "De Morgan's laws for quantifiers",
      "body": [
        {
          "type": "def",
          "text": "@¬∀x P(x) ≡ ∃x ¬P(x)@ — “not every @x@ has @P@” means “some @x@ does not have @P@.”"
        },
        {
          "type": "def",
          "text": "@¬∃x P(x) ≡ ∀x ¬P(x)@ — “no @x@ has @P@” means “every @x@ fails to have @P@.”"
        },
        {
          "type": "p",
          "text": "These are exactly De Morgan's laws extended to the quantifier setting. Negation crosses a quantifier by flipping it (@∀@ ↔ @∃@) and pushing the negation inside."

          "type": "mermaid",

        }
      ]
    }
