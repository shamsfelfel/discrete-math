window.LESSON_DATA = {
  id: '1.1',
  chapter: '1',
  title: 'Propositional Logic',

    {
      id: 'c1',
      title: 'Propositions',
      body: [
        { type: 'p', text: 'A proposition is a declarative sentence that is either true or false — but not both. Questions, commands, and statements with unknown truth values are not propositions.' },
        { type: 'def', text: 'Definition. A proposition is a declarative sentence (a sentence that declares a fact) that is either true or false, but not both.' },
        { type: 'p', text: 'We use lowercase letters such as @p@, @q@, @r@ as propositional variables to stand for propositions. Each has a truth value: T (true) or F (false).' }
      ],
      examples: [
        { label: 'Propositions', body: '“Toronto is the capital of Canada.” is a proposition (false). “1 + 1 = 2” is a proposition (true).' },
        { label: 'Not propositions', body: '“What time is it?” (a question), “Read this carefully.” (a command), and “@x@ + 1 = 2” (truth depends on @x@) are not propositions.' }
      ]
    },
    {
      id: 'c2',
      title: 'Negation',
      body: [
        { type: 'def', text: 'Definition. Let @p@ be a proposition. The negation of @p@, denoted @¬p@, is the statement “It is not the case that @p@.” The truth value of @¬p@ is the opposite of @p@.' },
        { type: 'p', text: 'Other notations you may see: @~p@, @p\'@, @!p@. The truth table for negation has just two rows:' },
        { type: 'truthTable',
          headers: ['p', '¬p'],
          rows: [['T','F'], ['F','T']]

      ],
      examples: [
        { label: 'Example', body: 'If @p@: “Michael\'s PC runs Linux,” then @¬p@: “Michael\'s PC does not run Linux.”' }
      ]
    },
    {
      id: 'c3',
      title: 'Conjunction (AND) and Disjunction (OR)',
      body: [
        { type: 'def', text: 'Conjunction @p ∧ q@ (read “p and q”) is true when both @p@ and @q@ are true; false otherwise.' },
        { type: 'def', text: 'Disjunction @p ∨ q@ (read “p or q”) is true when at least one of @p@, @q@ is true; false only when both are false. This is the inclusive or.' },
        { type: 'truthTable',
          headers: ['p', 'q', 'p ∧ q', 'p ∨ q'],
          rows: [['T','T','T','T'],['T','F','F','T'],['F','T','F','T'],['F','F','F','F']]
        }
      ],
      examples: [
        { label: 'Conjunction', body: 'If @p@: “It is raining” and @q@: “It is cold,” then @p ∧ q@ means “It is raining and it is cold.”' },
        { label: 'Inclusive vs. exclusive or', body: '“Students may take Calculus or Discrete Math” usually means inclusive or — taking both is allowed. The exclusive or @p ⊕ q@ would forbid taking both.' }

    },
    {
      id: 'c4',
      title: 'Conditional and Biconditional',
      body: [
        { type: 'def', text: 'Conditional @p → q@ (read “if @p@, then @q@”) is false only when @p@ is true and @q@ is false. In all other cases it is true. Here @p@ is the hypothesis and @q@ the conclusion.' },
        { type: 'def', text: 'Biconditional @p ↔ q@ (read “@p@ if and only if @q@”) is true when @p@ and @q@ have the same truth value, false otherwise. It is logically equivalent to @(p → q) ∧ (q → p)@.' },

          headers: ['p', 'q', 'p → q', 'p ↔ q'],
          rows: [['T','T','T','T'],['T','F','F','F'],['F','T','T','F'],['F','F','T','T']]

      examples: [
        { label: 'Reading a conditional', body: '“If you finish your meal, then you can have dessert.” Hypothesis: you finish your meal. Conclusion: you can have dessert. The statement is broken (false) only if you finished but got no dessert.' },

      examples: []

    },
    { id: 'q2', type: 'mcq', level: 1,
      prompt: 'Let @p@: “It is raining” and @q@: “The ground is wet.” Which compound proposition expresses “It is raining but the ground is not wet”?',
      options: [ '@p ∧ ¬q@', '@p ∨ ¬q@', '@¬p ∧ q@', '@p → ¬q@' ],
      answer: 0,
      explanation: '“But” is a conjunction — same logical meaning as “and.” Combine @p@ (it is raining) with @¬q@ (the ground is not wet).',
      moreExamples: [{ label: 'Same pattern', body: '“It snowed but the road is clear” → @p ∧ ¬q@ where @p@: it snowed, @q@: the road is not clear.' }]
    },
    { id: 'q3', type: 'mcq', level: 1,
      prompt: 'What is the truth value of @p → q@ when @p@ is false and @q@ is true?',
      options: ['True', 'False', 'Cannot be determined', 'Undefined'],
      answer: 0,
      explanation: 'A conditional is false only when the hypothesis is true and the conclusion is false. With @p@ false, @p → q@ is vacuously true regardless of @q@.',
      moreExamples: [{ label: 'Vacuous truth', body: '“If pigs fly, then 1 = 1.” The hypothesis is false, so the conditional is true.' }]
    },
    { id: 'q4', type: 'mcq', level: 2,
      prompt: 'Which of the following is logically equivalent to @p → q@?',

      answer: 2,
      explanation: 'The contrapositive @¬q → ¬p@ is always logically equivalent to @p → q@. The converse and inverse are equivalent to each other but not to the original.',

    },
    { id: 'q6', type: 'short', level: 2,

      acceptable: ['¬p ∨ ¬q', '¬p∨¬q', '(¬p) ∨ (¬q)', '~p ∨ ~q', '!p ∨ !q', '¬p v ¬q'],
      canonical: '¬p ∨ ¬q',
      explanation: 'By De Morgan\'s law: @¬(p ∧ q) ≡ ¬p ∨ ¬q@. Negating an AND turns it into an OR with each part negated.',
      moreExamples: [{ label: 'Mirror law', body: '@¬(p ∨ q) ≡ ¬p ∧ ¬q@. Negating OR turns it into AND of negations.' }]
    },

      explanation: 'Atomic variables come first, then unary subexpressions like @¬q@, then binary combinations, and finally the full expression.',

    { id: 'q8', type: 'fillblank', level: 2,

      template: 'Row 1 — p=T, q=T  →  p → q = [[1]]\nRow 2 — p=T, q=F  →  p → q = [[2]]\nRow 3 — p=F, q=T  →  p → q = [[3]]\nRow 4 — p=F, q=F  →  p → q = [[4]]',
      blanks: [
        { id: '1', type: 'select', options: ['T','F'], answer: 'T' },
        { id: '2', type: 'select', options: ['T','F'], answer: 'F' },
        { id: '3', type: 'select', options: ['T','F'], answer: 'T' },
        { id: '4', type: 'select', options: ['T','F'], answer: 'T' }
      ],
      explanation: 'The conditional is false only in row 2 (hypothesis true, conclusion false). All other rows are true — including the two rows where @p@ is false (vacuous truth).',

      palette: ['¬','∧','∨','→','↔','g','f','(',')'],
      template: '[[1]] ∧ [[2]]',
      blanks: [
        { id: '1', type: 'input', answer: 'g → f', acceptable: ['g→f','g -> f','(g→f)','(g -> f)','g→ f','g →f'] },
        { id: '2', type: 'input', answer: '¬f', acceptable: ['~f','!f','(¬f)','¬ f'] }
      ],
      explanation: '“@A@ only if @B@” translates as @A → B@, so “you can graduate only if you pass” is @g → f@. Combined with “you do not pass” (@¬f@) using and: @(g → f) ∧ ¬f@. Modus tollens then gives @¬g@.',
      moreExamples: [{ label: 'Easy to confuse', body: '“@A@ if @B@” means @B → A@. “@A@ only if @B@” means @A → B@. The “only” flips the direction.' }]

        'Compute the column for (p → q) ∧ p',
