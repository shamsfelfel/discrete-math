window.LESSON_DATA = {

  "chapter": "1",
  "title": "Propositional Equivalences",
  "lede": "Two compound propositions are logically equivalent when they always carry the same truth value. Recognizing equivalences lets us simplify arguments, rewrite specifications, and prove tautologies without ever building a truth table.",
  "concepts": [
    {

      "title": "Tautology, contradiction, contingency",

        {
          "type": "def",
          "text": "A tautology is a compound proposition that is true under every assignment of truth values. A contradiction is one that is false under every assignment. A contingency is neither — it is true for some assignments and false for others."

              "F",

              "F"

              "T",
              "F"

          "type": "p",
          "text": "@≡@ is not itself a logical connective; it is a meta-statement about two propositions. Some texts use @⇔@ instead."

      "examples": [
        {
          "label": "Truth-table proof",
          "body": "Show @¬(p ∨ q) ≡ ¬p ∧ ¬q@: the columns for both expressions agree on all four rows, so the biconditional is a tautology."
        }
      ]
    },
    {
      "id": "c3",
      "title": "The standard equivalence laws",
      "body": [
        {
          "type": "p",
          "text": "Memorize these. They are the algebra of logic, used to rewrite expressions in proofs and circuit simplification."
        },

          "type": "ul",
          "items": [

            "@p ∨ T ≡ T@,  @p ∧ F ≡ F@  — Domination",
            "@p ∨ p ≡ p@,  @p ∧ p ≡ p@  — Idempotent",

          "body": "@(p ∧ q) ∨ (p ∧ ¬q)@ — apply distributive: @p ∧ (q ∨ ¬q)@. Apply negation law: @p ∧ T@. Apply identity: @p@. So the whole expression simplifies to @p@."

          "type": "def",

          "type": "def",
          "text": "@¬(p ∨ q) ≡ ¬p ∧ ¬q@ — the negation of an OR distributes as an AND of negations."

        {
          "type": "p",
          "text": "Mnemonic: when negation crosses a connective, the connective flips (∧ ↔ ∨) and the negation distributes to each operand."
        },
        {
          "type": "p",
          "text": "These laws extend to any number of operands: @¬(p1 ∧ p2 ∧ … ∧ pn) ≡ ¬p1 ∨ ¬p2 ∨ … ∨ ¬pn@."
        }

      "examples": [
        {
          "label": "Negating a sentence",
          "body": "Sentence: “Heather will go to the concert and Steve will go to the concert.” Let @r@, @s@ for each. Negation: @¬(r ∧ s) ≡ ¬r ∨ ¬s@: “Heather will not go or Steve will not go.”"

      "title": "Conditional equivalences",
