  "title": "Rules of Inference",
  "lede": "A proof is a chain of valid inferences. Rules of inference are the templates we are allowed to apply at each step. Master modus ponens, modus tollens, and a handful of relatives, and you can construct — and check — the structure of any propositional argument.",

        {

          "text": "An argument in propositional logic is a sequence of propositions called premises ending in a final proposition called the conclusion. The argument is valid when the conjunction of the premises logically implies the conclusion: i.e., @p_1 ∧ p_2 ∧ … ∧ p_n → q@ is a tautology."

          "label": "Form vs content",

        }

              "p"

          "type": "p",
          "text": "Resolution is a single inference rule that, on its own, is sufficient for proving any tautology in conjunctive normal form. It is the engine inside automated theorem provers and most SAT solvers."
        },

          "type": "p",
          "text": "Why it works: in any model, either @p@ is true (then from @¬p ∨ r@, @r@ holds) or @p@ is false (then from @p ∨ q@, @q@ holds). Either way, @q ∨ r@ holds."

          "text": "Both fallacies confuse a conditional with its converse or its inverse. Remember: @p → q@ tells you nothing about what happens when @p@ is false (vacuous case) or when @q@ is true (could be many causes)."
        }

      "examples": [

          "label": "Recognizing the trap",

          "type": "ul",
