        {
          "def": {
            "term": "Sequence",
            "text": "A sequence is a function from a subset of the integers (usually {0, 1, 2, …} or {1, 2, 3, …}) to a set S. We write aₙ for the image of n — a term of the sequence — and {aₙ} for the whole sequence."

        },
        {
          "note": {
            "kind": "tip",
            "text": "A finite sequence a₁, a₂, …, aₙ is also called a string, written a₁a₂…aₙ. The empty string λ has length zero."

          "def": {
            "term": "Geometric progression",

          }
        },
        {
          "def": {
            "term": "Arithmetic progression",
            "text": "A sequence of the form a, a + d, a + 2d, … , a + nd, … with initial term a and common difference d. It is the discrete analogue of f(x) = dx + a."

        },

            "blocks": [

            "text": "Defined by f₀ = 0, f₁ = 1, and fₙ = fₙ₋₁ + fₙ₋₂ for n ≥ 2, giving 0, 1, 1, 2, 3, 5, 8, 13, …"
