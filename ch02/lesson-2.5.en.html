  "subtitle": "Measuring the size of infinite sets through one-to-one correspondences — countable, uncountable, and the surprises in between.",
  "cards": [
    {
      "title": "Same cardinality",
      "blocks": [
        {
          "def": {
            "term": "Same cardinality",
            "text": "Sets A and B have the same cardinality if and only if there is a one-to-one correspondence (a bijection) from A to B. We then write |A| = |B|."
          }
        },
        {
          "def": {
            "term": "Smaller or equal cardinality",

          }

          "p": "For infinite sets, cardinality is a <span class=\"sym\">relative</span> measure — it compares two sets rather than counting one. A bijection, not a count, is the right tool when sets are infinite."
        }
      ]
    },
    {
      "title": "Countable sets",
      "blocks": [
        {
          "def": {
            "term": "Countable / uncountable",
            "text": "A set is countable if it is finite or has the same cardinality as the set of positive integers Z⁺. A set that is not countable is uncountable."
          }
        },
        {
          "p": "When an infinite set <span class=\"sym\">S</span> is countable we write <span class=\"sym\">|S| = ℵ₀</span> (read “aleph-null”), the first transfinite cardinal."
        },
        {
          "note": {
            "kind": "tip",
            "text": "An infinite set is countable exactly when its elements can be listed in a sequence a₁, a₂, a₃, … indexed by the positive integers."
          }
        },

            "title": "Odd positive integers",
            "blocks": [

                "p": "<span class=\"sym\">f(n) = 2n − 1</span> is a bijection from <span class=\"sym\">Z⁺</span> to the odd positive integers (injective since <span class=\"sym\">2n−1 = 2m−1 ⇒ n = m</span>, and onto since any odd <span class=\"sym\">t = 2k − 1 = f(k)</span>). So they are countable."

            ]
          }
        }
      ]

      "title": "The integers and rationals are countable",
      "blocks": [

          "p": "The set of <span class=\"sym\">all integers Z</span> is countable: list them as <span class=\"sym\">0, 1, −1, 2, −2, 3, −3, …</span>, alternating signs to cover every integer exactly once."

          "p": "Surprisingly, the <span class=\"sym\">positive rationals Q⁺</span> are also countable. Arrange fractions <span class=\"sym\">p/q</span> in a grid by numerator and denominator, then traverse the diagonals, skipping repeats — every fraction is eventually reached. So <span class=\"sym\">|Q⁺| = ℵ₀</span>."
        },

          "note": {
            "kind": "tip",

          }
        }
      ]
    },

      "title": "The reals are uncountable (Cantor)",

        {
          "def": {
            "term": "Cantor diagonalization",
            "text": "A proof by contradiction: assume the reals in (0,1) can be listed r₁, r₂, r₃, …, then build a number differing from rᵢ in its i-th decimal digit, so it is on no row — contradiction."

            "text": "If A and B are countable sets, then A ∪ B is countable."

        },
        {
          "note": {
            "kind": "tip",
            "text": "Any subset of a countable set is countable; any set with an uncountable subset is uncountable."
          }
        }
      ]

          }
        },

          "p": "This is the workhorse for proving two sets have equal cardinality: build an injection each way instead of constructing one bijection directly. The theorem looks obvious but its proof is genuinely subtle."
        },

          }
        }
