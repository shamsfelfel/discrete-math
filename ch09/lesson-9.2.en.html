window.LESSON_DATA = {
  "id": "9.2",
  "chapter": "9",
  "title": "n-ary Relations and Their Applications",
  "lede": "An <span class=\"sym\">n</span>-ary relation is a set of ordered <span class=\"sym\">n</span>-tuples drawn from <span class=\"sym\">n</span> sets. These relations are the mathematical foundation of relational databases, where each row is an <span class=\"sym\">n</span>-tuple and operations like selection, projection, and join let us query the data.",
  "concepts": [
    {
      "id": "c1",
      "title": "n-ary relations, degree, and domains",
      "body": [
        {
          "type": "def",
          "text": "<b>Definition 1.</b> Let <span class=\"sym\">A₁, A₂, …, Aₙ</span> be sets. An <b><span class=\"sym\">n</span>-ary relation</b> on these sets is a subset of <span class=\"sym\">A₁ × A₂ × … × Aₙ</span>. The sets <span class=\"sym\">A₁, …, Aₙ</span> are the <b>domains</b> of the relation, and <span class=\"sym\">n</span> is its <b>degree</b>."
        },
        {
          "type": "p",
          "text": "So a binary relation (Section 9.1) is just the case <span class=\"sym\">n = 2</span>. An <span class=\"sym\">n</span>-ary relation is a set of ordered <span class=\"sym\">n</span>-tuples <span class=\"sym\">(a₁, a₂, …, aₙ)</span>."
        }
      ],
      "examples": [
        {
          "label": "Degree 3 on the naturals",
          "body": "Let <span class=\"sym\">R</span> on <span class=\"sym\">N × N × N</span> consist of triples <span class=\"sym\">(a, b, c)</span> with <span class=\"sym\">a &lt; b &lt; c</span>. Then <span class=\"sym\">(1, 2, 3) ∈ R</span> but <span class=\"sym\">(2, 4, 3) ∉ R</span>. Its degree is 3 and all its domains are <span class=\"sym\">N</span>."
        }
      ]
    },
    {
      "id": "c2",
      "title": "More n-ary relations",
      "body": [
        {
          "type": "p",
          "text": "The condition defining an <span class=\"sym\">n</span>-ary relation can be any predicate on the <span class=\"sym\">n</span>-tuple. The tuple belongs to the relation exactly when the predicate holds."
        },
        {
          "type": "p",
          "text": "Domains need not be distinct sets, and the same set can appear several times — as in <span class=\"sym\">Z × Z × Z</span>."
        }
      ],
      "examples": [
        {
          "label": "Arithmetic progressions",
          "body": "Let <span class=\"sym\">R</span> on <span class=\"sym\">Z × Z × Z</span> be the triples <span class=\"sym\">(a, b, c)</span> forming an arithmetic progression — that is, some integer <span class=\"sym\">k</span> has <span class=\"sym\">b − a = k</span> and <span class=\"sym\">c − b = k</span>. Then <span class=\"sym\">(1, 3, 5) ∈ R</span>, but <span class=\"sym\">(2, 5, 9) ∉ R</span>."
        }
      ]
    },
    {
      "id": "c3",
      "title": "The relational data model",
      "body": [
        {
          "type": "def",
          "text": "A database of records can be modelled as an <span class=\"sym\">n</span>-ary relation: each <b>record</b> is an <span class=\"sym\">n</span>-tuple <span class=\"sym\">(a₁, …, aₙ)</span>, and each component is drawn from a <b>field</b> (or attribute), whose set of possible values is a domain. This is the <b>relational data model</b>."
        },
        {
          "type": "p",
          "text": "It is natural to display such a relation as a <b>table</b>: each row is a record (an <span class=\"sym\">n</span>-tuple) and each column is a field. A student table might have fields <span class=\"sym\">(Name, ID, Major, GPA)</span> — a 4-ary relation."
        }
      ],
      "examples": [
        {
          "label": "A table is a relation",
          "body": "The rows <span class=\"sym\">(Ackermann, 231455, CS, 3.88)</span> and <span class=\"sym\">(Chou, 102147, CS, 3.49)</span> are 4-tuples of the student relation; the degree is 4."
        }
      ]
    },
    {
      "id": "c4",
      "title": "Primary and composite keys",
      "body": [
        {
          "type": "def",
          "text": "A domain (field) is a <b>primary key</b> when no two <span class=\"sym\">n</span>-tuples in the relation have the same value in that field. A primary key uniquely identifies each record."
        },
        {
          "type": "p",
          "text": "When no single field works, a combination of fields that is unique across all records is a <b>composite key</b>. Keys can depend on the current contents of the relation, but a well-designed database chooses keys that stay valid for every allowed state."
        }
      ],
      "examples": [
        {
          "label": "ID as a key",
          "body": "In <span class=\"sym\">(Name, ID, Major, GPA)</span> the <span class=\"sym\">ID</span> field is a primary key because student IDs are unique — but <span class=\"sym\">Major</span> is not, since many students share a major."
        }
      ]
    },
    {
      "id": "c5",
      "title": "Selection",
      "body": [
        {
          "type": "def",
          "text": "A <b>selection operator</b> <span class=\"sym\">sᴄ</span> maps an <span class=\"sym\">n</span>-ary relation <span class=\"sym\">R</span> to the sub-relation of all <span class=\"sym\">n</span>-tuples of <span class=\"sym\">R</span> that satisfy a condition <span class=\"sym\">C</span>. It keeps whole records but only those matching the condition."
        },
        {
          "type": "p",
          "text": "Selection is the &#x27;filter the rows&#x27; operation of a query: it never changes the fields, only which records survive."
        }
      ],
      "examples": [
        {
          "label": "Filtering rows",
          "body": "Applying <span class=\"sym\">s_{Major = CS}</span> to the student relation returns exactly the records whose <span class=\"sym\">Major</span> field equals <span class=\"sym\">CS</span>."
        }
      ]
    },
    {
      "id": "c6",
      "title": "Projection and join",
      "body": [
        {
          "type": "def",
          "text": "A <b>projection</b> <span class=\"sym\">Pᵢ₁…ᵢₘ</span> keeps only the fields <span class=\"sym\">i₁, …, iₘ</span> of each tuple, deleting the rest. Because the surviving fields may no longer distinguish records, projection can produce fewer tuples than it started with."
        },
        {
          "type": "def",
          "text": "A <b>join</b> <span class=\"sym\">Jₚ(R, S)</span> combines a relation <span class=\"sym\">R</span> of degree <span class=\"sym\">m</span> with a relation <span class=\"sym\">S</span> of degree <span class=\"sym\">n</span> that agree on <span class=\"sym\">p</span> shared fields, producing tuples of degree <span class=\"sym\">m + n − p</span> whenever the shared fields match."
        }
      ],
      "examples": [
        {
          "label": "Projecting away a field",
          "body": "The projection <span class=\"sym\">P₁,₃</span> applied to 4-tuples <span class=\"sym\">(Name, ID, Major, GPA)</span> yields pairs <span class=\"sym\">(Name, Major)</span>, discarding <span class=\"sym\">ID</span> and <span class=\"sym\">GPA</span>."
        }
      ]
    }
  ],
  "questions": [

        "A subset of <span class=\"sym\">A₁ × A₂ × … × Aₙ</span>",

        "An element of <span class=\"sym\">A₁ × … × Aₙ</span>"
