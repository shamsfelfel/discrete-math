window.LESSON_DATA = {
  "id": "9.4",
  "chapter": "9",
  "title": "Closures of Relations",
  "lede": "When a relation lacks a property <span class=\"sym\">P</span>, its <b>closure</b> with respect to <span class=\"sym\">P</span> is the smallest relation with property <span class=\"sym\">P</span> that contains it. Reflexive and symmetric closures are easy; the transitive closure requires the idea of paths and the connectivity relation.",
  "concepts": [
    {
      "id": "c1",
      "title": "What a closure is",
      "body": [
        {
          "type": "def",
          "text": "<b>Definition 1.</b> If <span class=\"sym\">R</span> is a relation on <span class=\"sym\">A</span>, the <b>closure of <span class=\"sym\">R</span> with respect to property <span class=\"sym\">P</span></b> (if it exists) is the relation <span class=\"sym\">S</span> with property <span class=\"sym\">P</span> that contains <span class=\"sym\">R</span> and is a subset of every relation with property <span class=\"sym\">P</span> that contains <span class=\"sym\">R</span>."
        },
        {
          "type": "p",
          "text": "In short, the closure is the <b>smallest</b> relation with the property that still contains all of <span class=\"sym\">R</span> — we add exactly the pairs we are forced to add, and no more."
        }
      ],
      "examples": [
        {
          "label": "Adding the least",
          "body": "<span class=\"sym\">R = {(1,1),(1,2),(2,1),(3,2)}</span> on <span class=\"sym\">{1,2,3}</span> is not reflexive; adding just <span class=\"sym\">(2,2)</span> and <span class=\"sym\">(3,3)</span> gives its reflexive closure."
        }
      ]
    },
    {
      "id": "c2",
      "title": "Reflexive closure",
      "body": [
        {
          "type": "def",
          "text": "The reflexive closure of <span class=\"sym\">R</span> is <span class=\"sym\">R ∪ Δ</span>, where <span class=\"sym\">Δ = {(a, a) | a ∈ A}</span> is the <b>diagonal relation</b>. We add every missing pair of the form <span class=\"sym\">(a, a)</span>."
        },
        {
          "type": "p",
          "text": "This is the smallest reflexive relation containing <span class=\"sym\">R</span>: reflexivity forces all diagonal pairs, and those are the only ones we add."
        }
      ],
      "examples": [
        {
          "label": "On the integers",
          "body": "For <span class=\"sym\">R = {(a, b) | a &lt; b}</span> on <span class=\"sym\">Z</span>, the reflexive closure is <span class=\"sym\">R ∪ Δ = {(a, b) | a ≤ b}</span>."
        }
      ]
    },
    {
      "id": "c3",
      "title": "Symmetric closure",
      "body": [
        {
          "type": "def",
          "text": "The symmetric closure of <span class=\"sym\">R</span> is <span class=\"sym\">R ∪ R⁻¹</span>, where <span class=\"sym\">R⁻¹ = {(b, a) | (a, b) ∈ R}</span> is the <b>inverse</b> relation. We add the reverse of every pair."
        },
        {
          "type": "p",
          "text": "Adding <span class=\"sym\">R⁻¹</span> forces every mirror pair to be present, which is exactly what symmetry requires — and nothing else is added."
        }
      ],
      "examples": [
        {
          "label": "On the positive integers",
          "body": "For <span class=\"sym\">R = {(a, b) | a &gt; b}</span>, the symmetric closure is <span class=\"sym\">R ∪ R⁻¹ = {(a, b) | a ≠ b}</span>."
        }
      ]
    },
    {
      "id": "c4",
      "title": "Paths and why transitive closure is harder",
      "body": [
        {
          "type": "p",
          "text": "Transitive closure cannot be found by adding one round of pairs: adding all missing <span class=\"sym\">(a, c)</span> for chains <span class=\"sym\">(a, b), (b, c)</span> can create new chains that still violate transitivity. We need paths."
        },
        {
          "type": "def",
          "text": "<b>Definition 2.</b> A <b>path</b> from <span class=\"sym\">a</span> to <span class=\"sym\">b</span> in a digraph is a sequence of edges <span class=\"sym\">(x₀, x₁), (x₁, x₂), …, (xₙ₋₁, xₙ)</span> with <span class=\"sym\">x₀ = a</span> and <span class=\"sym\">xₙ = b</span>; its <b>length</b> is <span class=\"sym\">n</span>. A path of length <span class=\"sym\">n ≥ 1</span> that begins and ends at the same vertex is a <b>circuit</b> (cycle)."
        }
      ],
      "examples": [
        {
          "label": "A path of length 3",
          "body": "If <span class=\"sym\">(a,b), (b,e), (e,d)</span> are edges, then <span class=\"sym\">a, b, e, d</span> is a path of length 3. A path like <span class=\"sym\">e, b, a, b, a, b, e</span> that returns to its start is a circuit."
        }
      ]
    },
    {
      "id": "c5",
      "title": "The connectivity relation and transitive closure",
      "body": [
        {
          "type": "def",
          "text": "<b>Theorem 1.</b> There is a path of length <span class=\"sym\">n</span> from <span class=\"sym\">a</span> to <span class=\"sym\">b</span> if and only if <span class=\"sym\">(a, b) ∈ Rⁿ</span>."
        },
        {
          "type": "def",
          "text": "<b>Definition 3.</b> The <b>connectivity relation</b> <span class=\"sym\">R*</span> consists of the pairs <span class=\"sym\">(a, b)</span> for which there is a path of length at least one from <span class=\"sym\">a</span> to <span class=\"sym\">b</span>: <span class=\"sym\">R* = ⋃ₙ₌₁ Rⁿ</span>."
        },
        {
          "type": "p",
          "text": "<b>Theorem 2.</b> The transitive closure of a relation <span class=\"sym\">R</span> equals its connectivity relation <span class=\"sym\">R*</span>."
        }
      ],
      "examples": [
        {
          "label": "&#x27;Has met&#x27;",
          "body": "If <span class=\"sym\">R</span> means &#x27;a has met b&#x27;, then <span class=\"sym\">R*</span> pairs <span class=\"sym\">a</span> with <span class=\"sym\">b</span> whenever a chain of acquaintances links them — a friend of a friend of a friend, to any depth."
        }
      ]
    },
    {
      "id": "c6",
      "title": "Computing the transitive closure with matrices",
      "body": [
        {
          "type": "def",
          "text": "<b>Theorem 3.</b> If <span class=\"sym\">Mᴿ</span> is the matrix of a relation on a set of <span class=\"sym\">n</span> elements, the matrix of the transitive closure is <span class=\"sym\">M_{R*} = Mᴿ ∨ Mᴿ^[2] ∨ Mᴿ^[3] ∨ … ∨ Mᴿ^[n]</span>."
        },

          "type": "p",
          "text": "Because a path in an <span class=\"sym\">n</span>-vertex graph need never be longer than <span class=\"sym\">n</span>, the join stops at the <span class=\"sym\">n</span>-th Boolean power. Warshall&#x27;s algorithm computes this more efficiently."
        }
      ],
      "examples": [
        {
          "label": "Why it stops at n",
          "body": "Any path between two of <span class=\"sym\">n</span> vertices that repeats a vertex can be shortened, so a shortest connecting path has length at most <span class=\"sym\">n</span> — no higher powers are needed."
        }
      ]
    }
  ],
