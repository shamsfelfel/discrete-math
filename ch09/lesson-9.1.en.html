window.LESSON_DATA = {
  "id": "9.1",
  "chapter": "9",
  "title": "Relations and Their Properties",
  "lede": "A binary relation from a set <span class=\"sym\">A</span> to a set <span class=\"sym\">B</span> is simply a subset of the Cartesian product <span class=\"sym\">A × B</span> — a set of ordered pairs. This is the most general way to link elements of sets, and we classify relations on a set by whether they are reflexive, symmetric, antisymmetric, or transitive.",
  "concepts": [
    {
      "id": "c1",
      "title": "Binary relations and notation",
      "body": [
        {
          "type": "p",
          "text": "The most direct way to express a relationship between elements of two sets is to use ordered pairs made up of two related elements. Relationships between elements of sets are represented by the structure called a binary relation."
        },
        {
          "type": "def",
          "text": "<b>Definition 1.</b> Let <span class=\"sym\">A</span> and <span class=\"sym\">B</span> be sets. A <b>binary relation from <span class=\"sym\">A</span> to <span class=\"sym\">B</span></b> is a subset of <span class=\"sym\">A × B</span>. In other words, it is a set <span class=\"sym\">R</span> of ordered pairs where the first element comes from <span class=\"sym\">A</span> and the second from <span class=\"sym\">B</span>."
        },
        {
          "type": "p",
          "text": "We use the notation <span class=\"sym\">a R b</span> to denote that <span class=\"sym\">(a, b) ∈ R</span>, and <span class=\"sym\">a R̸ b</span> to denote that <span class=\"sym\">(a, b) ∉ R</span>. When <span class=\"sym\">(a, b) ∈ R</span>, we say <span class=\"sym\">a</span> is related to <span class=\"sym\">b</span> by <span class=\"sym\">R</span>."
        }
      ],
      "examples": [
        {
          "label": "A relation from A to B",
          "body": "Let <span class=\"sym\">A = {0, 1, 2}</span> and <span class=\"sym\">B = {a, b}</span>. Then <span class=\"sym\">{(0, a), (0, b), (1, a), (2, b)}</span> is a relation from <span class=\"sym\">A</span> to <span class=\"sym\">B</span> — so <span class=\"sym\">0 R a</span> holds, but <span class=\"sym\">1 R̸ b</span>."
        }
      ]
    },
    {
      "id": "c2",
      "title": "Functions as relations",
      "body": [
        {
          "type": "p",
          "text": "Recall that a function <span class=\"sym\">f</span> from a set <span class=\"sym\">A</span> to a set <span class=\"sym\">B</span> assigns exactly one element of <span class=\"sym\">B</span> to each element of <span class=\"sym\">A</span>. The graph of <span class=\"sym\">f</span> is the set of ordered pairs <span class=\"sym\">(a, b)</span> with <span class=\"sym\">b = f(a)</span>. Because this graph is a subset of <span class=\"sym\">A × B</span>, it is a relation from <span class=\"sym\">A</span> to <span class=\"sym\">B</span>."
        },
        {
          "type": "def",
          "text": "Conversely, if <span class=\"sym\">R</span> is a relation from <span class=\"sym\">A</span> to <span class=\"sym\">B</span> such that every element of <span class=\"sym\">A</span> is the first element of exactly one ordered pair of <span class=\"sym\">R</span>, then a function can be defined with <span class=\"sym\">R</span> as its graph."
        },
        {
          "type": "p",
          "text": "Relations are a generalization of function graphs: a relation can express a one-to-many relationship, where an element of <span class=\"sym\">A</span> may be related to more than one element of <span class=\"sym\">B</span> — something a function cannot do."
        }
      ],
      "examples": [
        {
          "label": "One-to-many",
          "body": "A student may be enrolled in several courses, so the &#x27;is enrolled in&#x27; relation pairs one student with many courses — not a function, but a perfectly good relation."
        }
      ]
    },
    {
      "id": "c3",
      "title": "Relations on a set",
      "body": [
        {
          "type": "def",
          "text": "<b>Definition 2.</b> A <b>relation on a set <span class=\"sym\">A</span></b> is a relation from <span class=\"sym\">A</span> to <span class=\"sym\">A</span> — that is, a subset of <span class=\"sym\">A × A</span>."
        },
        {
          "type": "p",
          "text": "For example, on <span class=\"sym\">A = {1, 2, 3, 4}</span> the relation <span class=\"sym\">R = {(a, b) | a divides b}</span> is <span class=\"sym\">{(1,1), (1,2), (1,3), (1,4), (2,2), (2,4), (3,3), (4,4)}</span>."
        },
        {
          "type": "p",
          "text": "Because a set with <span class=\"sym\">n</span> elements has <span class=\"sym\">n²</span> ordered pairs in <span class=\"sym\">A × A</span>, there are <span class=\"sym\">2^(n²)</span> different relations on it — a set of 3 elements already has <span class=\"sym\">2⁹ = 512</span> relations."
        }
      ],
      "examples": [
        {
          "label": "Relations on the integers",
          "body": "<span class=\"sym\">R₁ = {(a,b) | a ≤ b}</span>, <span class=\"sym\">R₂ = {(a,b) | a &gt; b}</span>, <span class=\"sym\">R₄ = {(a,b) | a = b}</span>, and <span class=\"sym\">R₅ = {(a,b) | a = b + 1}</span> are all relations on <span class=\"sym\">Z</span>. The pair <span class=\"sym\">(1, 1)</span> lies in <span class=\"sym\">R₁</span> and <span class=\"sym\">R₄</span> but not <span class=\"sym\">R₂</span> or <span class=\"sym\">R₅</span>."
        }
      ]
    },
    {
      "id": "c4",
      "title": "Reflexive, symmetric, and antisymmetric",
      "body": [
        {
          "type": "def",
          "text": "<b>Reflexive:</b> <span class=\"sym\">R</span> is reflexive if <span class=\"sym\">(a, a) ∈ R</span> for every element <span class=\"sym\">a ∈ A</span> — that is, <span class=\"sym\">∀a ((a, a) ∈ R)</span>."
        },
        {
          "type": "def",
          "text": "<b>Symmetric:</b> <span class=\"sym\">R</span> is symmetric if <span class=\"sym\">(b, a) ∈ R</span> whenever <span class=\"sym\">(a, b) ∈ R</span>: <span class=\"sym\">∀a∀b((a,b) ∈ R → (b,a) ∈ R)</span>. <b>Antisymmetric:</b> if <span class=\"sym\">(a, b) ∈ R</span> and <span class=\"sym\">(b, a) ∈ R</span> imply <span class=\"sym\">a = b</span>: <span class=\"sym\">∀a∀b(((a,b) ∈ R ∧ (b,a) ∈ R) → a = b)</span>."
        },
        {
          "type": "p",
          "text": "Symmetric and antisymmetric are <b>not</b> opposites. A relation can be both (for example the equality relation), and a relation can be neither."
        }

      "examples": [
        {
          "label": "Checking the properties",
          "body": "On <span class=\"sym\">{1,2,3,4}</span>, the relation <span class=\"sym\">R = {(1,1),(1,2),(2,1),(2,2)}</span> is symmetric (each <span class=\"sym\">(a,b)</span> has its mirror <span class=\"sym\">(b,a)</span>) but not reflexive because <span class=\"sym\">(3,3) ∉ R</span>."

          "type": "p",

        },
        {
          "type": "p",
          "text": "To show a relation is <b>not</b> transitive, exhibit a single counterexample: pairs <span class=\"sym\">(a,b)</span> and <span class=\"sym\">(b,c)</span> in <span class=\"sym\">R</span> with <span class=\"sym\">(a,c) ∉ R</span>."
        }

      "body": [
        {
          "type": "p",
          "text": "Because relations from <span class=\"sym\">A</span> to <span class=\"sym\">B</span> are sets of pairs, any two can be combined with the set operations <span class=\"sym\">∪</span>, <span class=\"sym\">∩</span>, <span class=\"sym\">−</span>, and <span class=\"sym\">⊕</span> (symmetric difference)."
        },
        {
          "type": "def",
          "text": "<b>Definition 6 (composite).</b> Let <span class=\"sym\">R</span> be a relation from <span class=\"sym\">A</span> to <span class=\"sym\">B</span> and <span class=\"sym\">S</span> a relation from <span class=\"sym\">B</span> to <span class=\"sym\">C</span>. The composite <span class=\"sym\">S ∘ R</span> consists of the pairs <span class=\"sym\">(a, c)</span> for which there exists <span class=\"sym\">b ∈ B</span> with <span class=\"sym\">(a, b) ∈ R</span> and <span class=\"sym\">(b, c) ∈ S</span>."

          "type": "def",
          "text": "<b>Definition 7 (powers).</b> The powers of a relation <span class=\"sym\">R</span> on <span class=\"sym\">A</span> are defined recursively by <span class=\"sym\">R¹ = R</span> and <span class=\"sym\">R^(n+1) = Rⁿ ∘ R</span>."

        }

  ],
