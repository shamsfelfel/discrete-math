  "id": "9.3",
  "chapter": "9",
  "title": "Representing Relations",
  "lede": "Beyond listing its ordered pairs, a relation on finite sets can be stored as a <span class=\"sym\">0/1</span> matrix — convenient for computation — or drawn as a directed graph, which makes its structural properties easy to see at a glance.",
  "concepts": [
    {
      "id": "c1",
      "title": "The zero–one matrix of a relation",
      "body": [
        {
          "type": "def",
          "text": "Let <span class=\"sym\">R</span> be a relation from <span class=\"sym\">A = {a₁, …, aₘ}</span> to <span class=\"sym\">B = {b₁, …, bₙ}</span>. Its matrix is <span class=\"sym\">Mᴿ = [mᵢⱼ]</span>, where <span class=\"sym\">mᵢⱼ = 1</span> if <span class=\"sym\">(aᵢ, bⱼ) ∈ R</span> and <span class=\"sym\">mᵢⱼ = 0</span> otherwise."
        },
        {
          "type": "p",
          "text": "The elements of <span class=\"sym\">A</span> and <span class=\"sym\">B</span> are listed in some fixed order; when <span class=\"sym\">A = B</span> the same order is used for rows and columns, giving a square matrix."
        }
      ],
      "examples": [
        {
          "label": "Building the matrix",
          "body": "For <span class=\"sym\">A = {1,2,3}</span>, <span class=\"sym\">B = {1,2}</span> and <span class=\"sym\">R = {(2,1),(3,1),(3,2)}</span> (pairs with <span class=\"sym\">a &gt; b</span>), the matrix has 1s exactly in those three positions and 0s elsewhere."
        }
      ]
    },
    {
      "id": "c2",
      "title": "Reading properties off the matrix",
      "body": [
        {
          "type": "p",
          "text": "For a relation on a set (a square matrix) the three properties have clean matrix criteria:"
        },

          "type": "truthTable",
          "headers": [
            "Property",
            "Matrix criterion"
          ],
          "rows": [
            [
              "Reflexive",
              "every diagonal entry <span class=\"sym\">mᵢᵢ = 1</span>"

            [
              "Symmetric",
              "<span class=\"sym\">Mᴿ = (Mᴿ)ᵗ</span>, i.e. <span class=\"sym\">mᵢⱼ = mⱼᵢ</span>"

              "Antisymmetric",

        },
        {
          "type": "p",
          "text": "So reflexivity is a glance down the main diagonal, and symmetry is a check that the matrix equals its own transpose."
        }
      ],
      "examples": [
        {
          "label": "All three at once",
          "body": "The matrix with rows <span class=\"sym\">(1 1 0), (1 1 1), (0 1 1)</span> has all diagonal entries 1 (reflexive) and equals its transpose (symmetric), but is therefore not antisymmetric."
        }
      ]
    },
    {
      "id": "c3",
      "title": "Union and intersection by join and meet",
      "body": [
        {
          "type": "def",
          "text": "If <span class=\"sym\">R₁</span> and <span class=\"sym\">R₂</span> are relations on a set with matrices <span class=\"sym\">Mᴿ₁</span> and <span class=\"sym\">Mᴿ₂</span>, then <span class=\"sym\">M_{R₁∪R₂} = Mᴿ₁ ∨ Mᴿ₂</span> (the Boolean join) and <span class=\"sym\">M_{R₁∩R₂} = Mᴿ₁ ∧ Mᴿ₂</span> (the Boolean meet)."
        },
        {
          "type": "p",
          "text": "The join puts a 1 wherever <b>either</b> matrix has a 1; the meet puts a 1 wherever <b>both</b> do — matching the union and intersection of the relations entry by entry."
        }
      ],
      "examples": [
        {
          "label": "Join and meet",
          "body": "With <span class=\"sym\">Mᴿ₁</span> rows <span class=\"sym\">(1 0 1),(1 0 0),(0 1 0)</span> and <span class=\"sym\">Mᴿ₂</span> rows <span class=\"sym\">(1 0 1),(0 1 1),(1 0 0)</span>, the join is <span class=\"sym\">(1 0 1),(1 1 1),(1 1 0)</span> and the meet is <span class=\"sym\">(1 0 1),(0 0 0),(0 0 0)</span>."
        }
      ]
    },
    {
      "id": "c4",
      "title": "Composite and powers by Boolean product",
      "body": [
        {
          "type": "def",
          "text": "If <span class=\"sym\">R</span> is from <span class=\"sym\">A</span> to <span class=\"sym\">B</span> and <span class=\"sym\">S</span> from <span class=\"sym\">B</span> to <span class=\"sym\">C</span>, then <span class=\"sym\">M_{S∘R} = Mᴿ ⊙ Mˢ</span>, the Boolean product of the two matrices."

          "type": "p",
          "text": "Powers follow the same rule: the matrix of <span class=\"sym\">Rⁿ</span> is the <span class=\"sym\">n</span>-th Boolean power <span class=\"sym\">Mᴿ^[n]</span>. The Boolean product uses <span class=\"sym\">∧</span> for the term products and <span class=\"sym\">∨</span> to combine them."
        }
      ],
      "examples": [
        {
          "label": "Squaring a relation",
          "body": "For <span class=\"sym\">Mᴿ</span> with rows <span class=\"sym\">(0 1 0),(0 1 1),(1 0 0)</span>, the Boolean square <span class=\"sym\">Mᴿ^[2]</span> has rows <span class=\"sym\">(0 1 1),(1 1 1),(0 1 0)</span> — the matrix of <span class=\"sym\">R²</span>."
        }
      ]
    },
    {
      "id": "c5",
      "title": "Directed graphs (digraphs)",
      "body": [
        {
          "type": "def",
          "text": "A <b>directed graph</b> or <b>digraph</b> consists of a set <span class=\"sym\">V</span> of vertices (nodes) and a set <span class=\"sym\">E</span> of edges (arcs), each an ordered pair from <span class=\"sym\">V</span>. In the edge <span class=\"sym\">(a, b)</span>, <span class=\"sym\">a</span> is the initial vertex and <span class=\"sym\">b</span> the terminal vertex."
        },
        {
          "type": "p",
          "text": "A relation on a set is drawn by taking its elements as vertices and each pair <span class=\"sym\">(a, b) ∈ R</span> as an edge from <span class=\"sym\">a</span> to <span class=\"sym\">b</span>. An edge <span class=\"sym\">(a, a)</span> from a vertex back to itself is a <b>loop</b>."
        }
      ],
      "examples": [
        {
          "label": "A digraph of a relation",
          "body": "The relation <span class=\"sym\">R = {(1,1),(1,3),(2,1),(2,3),(2,4),(3,1),(3,2),(4,1)}</span> on <span class=\"sym\">{1,2,3,4}</span> is drawn with a loop at 1 and arrows for every other pair."
        }
      ]

          "type": "p",
          "text": "These pictorial tests make it fast to classify a relation: scan for missing loops, one-way edges, and missing &#x27;shortcut&#x27; edges that would complete a triangle."
        }
      ],
      "examples": [
        {
          "label": "Classifying from a picture",
          "body": "A digraph with a loop at every vertex but a single one-way edge <span class=\"sym\">x→y</span> (no <span class=\"sym\">y→x</span>) is reflexive and antisymmetric, but not symmetric."
        }
      ]
    }
  ],
  "questions": [
