window.LESSON_DATA = {
  "id": "3.1",
  "chapter": "3",
  "title": "Algorithms",
  "lede": "An algorithm is a finite sequence of precise instructions for performing a computation or solving a problem — the bridge from a mathematical model to an actual solution.",
  "concepts": [
    {
      "id": "c1",
      "title": "What is an algorithm?",
      "body": [
        {
          "type": "p",
          "text": "When a problem is posed — find the largest integer in a list, sort a set, find a shortest path — the first step is to build a mathematical model. The second step is a method that solves the general problem on that model. Such a step-by-step method is an algorithm."
        },
        {
          "type": "def",
          "text": "An algorithm is a finite sequence of precise instructions for performing a computation or for solving a problem."
        },
        {
          "type": "p",
          "text": "The word comes from al-Khowarizmi, a ninth-century mathematician whose book on Hindu numerals underlies modern decimal notation. To describe algorithms without committing to one programming language, this book uses pseudocode — an intermediate step between plain English and real code."
        },
        {
          "type": "p",
          "text": "Algorithm 1 finds the maximum of <span class=\"sym\">a1, a2, …, an</span>: set <span class=\"sym\">max := a1</span>, then loop <span class=\"sym\">i := 2 to n</span> and replace <span class=\"sym\">max</span> whenever <span class=\"sym\">ai &gt; max</span>. A trace on <span class=\"sym\">8, 4, 11, 3, 10</span> gives <span class=\"sym\">max</span> values <span class=\"sym\">8, 8, 11, 11, 11</span>, ending at <span class=\"sym\">11</span>."
        },
        {
          "type": "mermaid",
          "code": "graph TD\n  A[\"max := a1\"] --> B{\"i ≤ n ?\"}\n  B -- no --> E[\"return max\"]\n  B -- yes --> C{\"ai > max ?\"}\n  C -- yes --> D[\"max := ai\"]\n  C -- no --> F[\"i := i + 1\"]\n  D --> F\n  F --> B"
        }
      ],
      "examples": [
        {
          "label": "Pseudocode — Algorithm 1",
          "body": "procedure max(<span class=\"sym\">a1, a2, …, an</span>: integers) · <span class=\"sym\">max := a1</span> · for <span class=\"sym\">i := 2 to n</span> · if <span class=\"sym\">max &lt; ai</span> then <span class=\"sym\">max := ai</span> · return <span class=\"sym\">max</span>."
        }
      ]
    },
    {
      "id": "c2",
      "title": "Properties algorithms share",
      "body": [
        {
          "type": "p",
          "text": "Well-designed algorithms generally have seven properties. They are worth checking whenever you describe a procedure."
        },
        {
          "type": "ul",
          "items": [
            "Input — values are taken from a specified set.",
            "Output — each input produces output that solves the problem.",
            "Definiteness — every step is defined precisely.",
            "Correctness — the output is correct for every valid input.",
            "Finiteness — it halts after a finite number of steps.",
            "Effectiveness — each step can be done exactly in finite time.",
            "Generality — it works for all problems of the desired form, not one case."
          ]
        },
        {
          "type": "p",
          "text": "For Algorithm 1: the input is a sequence of integers, the output is the largest term, each step is an assignment or comparison (definite, effective), it halts after examining all <span class=\"sym\">n</span> terms (finite), and it works for any finite sequence (general)."
        }
      ]
    },
    {
      "id": "c3",
      "title": "Linear search",
      "body": [
        {
          "type": "p",
          "text": "A searching problem asks: locate <span class=\"sym\">x</span> in a list <span class=\"sym\">a1, a2, …, an</span> of distinct elements, or report that it is absent. The answer is the position <span class=\"sym\">i</span> where <span class=\"sym\">x = ai</span>, or <span class=\"sym\">0</span> if <span class=\"sym\">x</span> is not present."
        },
        {
          "type": "p",
          "text": "The linear (sequential) search compares <span class=\"sym\">x</span> with <span class=\"sym\">a1</span>, then <span class=\"sym\">a2</span>, and so on, stopping at the first match. If the whole list is scanned with no match, it returns <span class=\"sym\">0</span>. It works on any list — sorted or not."
        },
        {
          "type": "def",
          "text": "Linear search: scan terms left to right until <span class=\"sym\">x = ai</span> (return <span class=\"sym\">i</span>) or the list ends (return <span class=\"sym\">0</span>)."
        }
      ],
      "examples": [
        {
          "label": "Pseudocode — Algorithm 2",
          "body": "procedure linear search(<span class=\"sym\">x</span>: integer, <span class=\"sym\">a1, …, an</span>: distinct integers) · <span class=\"sym\">i := 1</span> · while <span class=\"sym\">(i ≤ n and x ≠ ai)</span>: <span class=\"sym\">i := i + 1</span> · if <span class=\"sym\">i ≤ n</span> then <span class=\"sym\">location := i</span> else <span class=\"sym\">location := 0</span> · return <span class=\"sym\">location</span>."
        }
      ]
    },
    {
      "id": "c4",
      "title": "Binary search",
      "body": [
        {
          "type": "p",
          "text": "Binary search is far more efficient than linear search, but it requires the list to be sorted in increasing order. It compares <span class=\"sym\">x</span> with the middle term, then keeps only the half that could contain <span class=\"sym\">x</span>, repeating until one term remains."
        },
        {
          "type": "p",
          "text": "With endpoints <span class=\"sym\">i</span> (left) and <span class=\"sym\">j</span> (right), the middle index is <span class=\"sym\">m = ⌊(i + j)/2⌋</span>. If <span class=\"sym\">x &gt; am</span>, search the upper half (<span class=\"sym\">i := m + 1</span>); otherwise the lower half (<span class=\"sym\">j := m</span>). Each round roughly halves the list."
        },
        {
          "type": "p",
          "text": "Searching for <span class=\"sym\">19</span> in a 16-term list halves it to 8, then 4, then 2, then 1 term — just a handful of comparisons, versus up to 16 for a linear scan."
        }
      ],
      "examples": [
        {
          "label": "Pseudocode — Algorithm 3",
          "body": "procedure binary search(<span class=\"sym\">x</span>: integer, <span class=\"sym\">a1, …, an</span>: increasing integers) · <span class=\"sym\">i := 1</span>; <span class=\"sym\">j := n</span> · while <span class=\"sym\">i &lt; j</span>: <span class=\"sym\">m := ⌊(i + j)/2⌋</span>; if <span class=\"sym\">x &gt; am</span> then <span class=\"sym\">i := m + 1</span> else <span class=\"sym\">j := m</span> · if <span class=\"sym\">x = ai</span> then <span class=\"sym\">location := i</span> else <span class=\"sym\">location := 0</span> · return <span class=\"sym\">location</span>."
        }
      ]
    },
    {
      "id": "c5",
      "title": "Sorting — bubble &amp; insertion",
      "body": [
        {
          "type": "p",
          "text": "Sorting puts list elements into order (increasing, decreasing, alphabetic). Two simple — if not the fastest — sorts are the bubble sort and the insertion sort."
        },
        {
          "type": "p",
          "text": "Bubble sort makes repeated passes, comparing adjacent terms and interchanging them if out of order. After pass <span class=\"sym\">i</span>, the <span class=\"sym\">i</span> largest elements have &#x27;bubbled&#x27; to their final places. On <span class=\"sym\">3, 2, 4, 1, 5</span> the first pass yields <span class=\"sym\">2, 3, 1, 4, 5</span>, and continued passes finish the order."
        },
        {
          "type": "p",
          "text": "Insertion sort takes each term in turn and inserts it into its correct place among the already-sorted terms to its left, using a linear search to find the spot. On <span class=\"sym\">3, 2, 4, 1, 5</span> it produces <span class=\"sym\">2,3,4,1,5</span> then <span class=\"sym\">1,2,3,4,5</span>."
        },

    },
    {

      "body": [
        {
          "type": "p",
          "text": "Optimization problems ask for a solution that minimizes or maximizes some value. A greedy algorithm makes the locally best choice at each step. It is called &#x27;greedy&#x27; whether or not that strategy actually reaches an optimum — you must prove optimality or exhibit a counterexample."
        },
        {
          "type": "p",
          "text": "The cashier&#x27;s algorithm makes change by repeatedly taking the largest coin that fits. For <span class=\"sym\">67</span> cents with quarters, dimes, nickels, pennies it gives <span class=\"sym\">25, 25, 10, 5, 1, 1</span>. With U.S. coins it is provably optimal — but remove the nickel and it fails: for <span class=\"sym\">30</span> cents it returns a quarter and five pennies (6 coins) instead of three dimes."
        },
        {
          "type": "p",
          "text": "For scheduling the most non-overlapping talks, the criterion that works is earliest finish time — selecting earliest start or shortest talk can be beaten by counterexamples."
        },

          "type": "def",
          "text": "The halting problem asks for a procedure that decides, for any program and input, whether the program eventually halts. Turing proved in 1936 that no such procedure exists — it is unsolvable. The proof builds <span class=\"sym\">K(P)</span> that does the opposite of <span class=\"sym\">H(P,P)</span>, then runs <span class=\"sym\">K</span> on itself to force a contradiction."
        }
      ]
    }
  ],
