window.LESSON_DATA = {
  "id": "3.3",
  "chapter": "3",
  "title": "The Complexity of Algorithms",
  "lede": "Algorithmic complexity measures the resources — chiefly time, counted as basic operations — an algorithm needs as a function of input size, expressed with big-O and big-Theta.",
  "concepts": [
    {
      "id": "c1",
      "title": "Time complexity and how we count it",
      "body": [
        {
          "type": "p",
          "text": "The complexity of an algorithm has two facets: time complexity (how long it runs) and space complexity (how much memory it uses). This section measures time complexity by counting the basic operations — comparisons, additions, multiplications — as a function of the input size <span class=\"sym\">n</span>."
        },
        {
          "type": "def",
          "text": "We express the count with big-O or big-Theta in terms of <span class=\"sym\">n</span>. Constant factors and machine speed are deliberately ignored, so the same analysis holds across hardware."
        },
        {
          "type": "p",
          "text": "Finding the maximum of <span class=\"sym\">n</span> elements (Algorithm 1 of §3.1) makes one comparison <span class=\"sym\">i ≤ n</span> to test the loop and one <span class=\"sym\">max &lt; ai</span> each pass: about <span class=\"sym\">2n − 1</span> comparisons, which is <span class=\"sym\">Θ(n)</span> — linear."
        }
      ],
      "examples": [
        {
          "label": "Max-finding count",
          "body": "<span class=\"sym\">2(n − 1) + 1 = 2n − 1</span> comparisons; <span class=\"sym\">2n − 1</span> is <span class=\"sym\">Θ(n)</span>, so finding the maximum is a linear-time algorithm."
        }
      ]
    },
    {
      "id": "c2",
      "title": "Worst-case and average-case analysis",
      "body": [
        {
          "type": "p",
          "text": "Because the number of operations can depend on the particular input, we report it in standardised ways. Worst-case complexity is the largest count over all inputs of size <span class=\"sym\">n</span> — a guarantee that the algorithm is never slower than this."
        },
        {
          "type": "p",
          "text": "Average-case complexity averages the count over all inputs of size <span class=\"sym\">n</span>, usually harder to compute because it needs assumptions about how inputs are distributed."
        },
        {
          "type": "p",
          "text": "Linear search (Algorithm 2) compares <span class=\"sym\">x</span> with each term. In the worst case — <span class=\"sym\">x</span> absent or last — it uses <span class=\"sym\">2n + 2</span> comparisons, which is <span class=\"sym\">Θ(n)</span>. Its average case is also <span class=\"sym\">Θ(n)</span>."
        },
        {
          "type": "ul",
          "items": [
            "Worst case: maximum operations over all inputs of size <span class=\"sym\">n</span>.",
            "Average case: mean operations over all inputs of size <span class=\"sym\">n</span>.",
            "Worst-case analysis is most common — it bounds performance with certainty."
          ]
        }
      ],
      "examples": [
        {
          "label": "Linear search, worst case",
          "body": "<span class=\"sym\">2n + 2</span> comparisons when <span class=\"sym\">x</span> is not in the list (two per term plus the final loop test), and <span class=\"sym\">2n + 2</span> is <span class=\"sym\">Θ(n)</span>."
        }
      ]
    },
    {
      "id": "c3",
      "title": "Search and sort complexities",
      "body": [
        {
          "type": "p",
          "text": "The standard searching and sorting algorithms from §3.1 have these worst-case complexities, measured in comparisons:"
        },
        {
          "type": "table",
          "headers": [
            "Algorithm",
            "Worst-case comparisons",
            "Order"
          ],
          "rows": [
            [
              "Linear search",
              "<span class=\"sym\">2n + 2</span>",
              "<span class=\"sym\">Θ(n)</span>"
            ],
            [
              "Binary search",
              "<span class=\"sym\">2⌈log n⌉ + 2</span>",
              "<span class=\"sym\">Θ(log n)</span>"
            ],
            [
              "Bubble sort",
              "<span class=\"sym\">n(n − 1)/2</span>",
              "<span class=\"sym\">Θ(n²)</span>"
            ],
            [
              "Insertion sort",
              "<span class=\"sym\">n(n − 1)/2</span>",
              "<span class=\"sym\">Θ(n²)</span>"
            ]
          ]
        },
        {
          "type": "p",
          "text": "Binary search is dramatically faster than linear search on a sorted list because it halves the search space each step, giving <span class=\"sym\">Θ(log n)</span> rather than <span class=\"sym\">Θ(n)</span>. Both bubble and insertion sort are <span class=\"sym\">Θ(n²)</span> in the worst case."
        }
      ],
      "examples": [
        {
          "label": "Binary search count",
          "body": "At most <span class=\"sym\">2k + 2 = 2⌈log n⌉ + 2</span> comparisons (with <span class=\"sym\">k = ⌈log n⌉</span> halvings), and <span class=\"sym\">2⌈log n⌉ + 2</span> is <span class=\"sym\">Θ(log n)</span>."
        }
      ]
    },
    {
      "id": "c4",
      "title": "Matrix multiplication",
      "body": [
        {
          "type": "p",
          "text": "Multiplying two <span class=\"sym\">n × n</span> matrices by the definition (Algorithm 1) computes each of the <span class=\"sym\">n²</span> entries of the product as a sum of <span class=\"sym\">n</span> products."
        },
        {
          "type": "def",
          "text": "Each entry needs <span class=\"sym\">n</span> multiplications and <span class=\"sym\">n − 1</span> additions. Across all <span class=\"sym\">n²</span> entries: <span class=\"sym\">n³</span> multiplications and <span class=\"sym\">n²(n − 1)</span> additions — so the direct method is <span class=\"sym\">Θ(n³)</span>."
        },
        {
          "type": "p",
          "text": "Surprisingly, faster matrix-multiplication algorithms exist that beat <span class=\"sym\">n³</span>. The order in which a chain of matrices is multiplied also matters enormously: for compatible <span class=\"sym\">A1, A2, A3</span>, computing <span class=\"sym\">A1(A2 A3)</span> may cost <span class=\"sym\">14000</span> multiplications while <span class=\"sym\">(A1 A2)A3</span> costs <span class=\"sym\">36000</span> — same answer, very different work."
        }
      ],
      "examples": [
        {
          "label": "Operation count",
          "body": "Direct <span class=\"sym\">n × n</span> multiplication: <span class=\"sym\">n³</span> multiplications and <span class=\"sym\">n²(n − 1)</span> additions, total <span class=\"sym\">Θ(n³)</span>."
        }
      ]
    },
    {
      "id": "c5",
      "title": "Complexity terminology",

        {

            "Terminology"

            [

        }

    },
    {
      "id": "c6",
      "title": "Tractable, intractable, and P vs NP",
      "body": [
        {
          "type": "p",
          "text": "Problems are classified by the best algorithm known to solve them."
        },
        {
          "type": "ul",
          "items": [
            "Tractable: solvable with worst-case polynomial-time complexity (<span class=\"sym\">Θ(nᵇ)</span>). These belong to class <span class=\"sym\">P</span>.",
            "Intractable: no polynomial-time algorithm is known; the worst case typically needs exponential time.",
            "Unsolvable: no algorithm exists at all (e.g. the halting problem)."
          ]
        },
        {
          "type": "p",
          "text": "Class <span class=\"sym\">NP</span> (nondeterministic polynomial time) contains problems whose proposed solutions can be verified in polynomial time. Whether <span class=\"sym\">P = NP</span> — whether every quickly-checkable problem is also quickly-solvable — is the most famous open problem in theoretical computer science, one of the seven Millennium Prize Problems (<span class=\"sym\">$1</span> million)."
        },
        {
          "type": "def",
          "text": "An <span class=\"sym\">NP</span>-complete problem is one in <span class=\"sym\">NP</span> such that, if it had a polynomial-time algorithm, then every <span class=\"sym\">NP</span> problem would too. Satisfiability is <span class=\"sym\">NP</span>-complete — the Cook–Levin theorem."
        }
      ]
    }
  ],
