window.LESSON_DATA = {
  "id": "3.2",
  "chapter": "3",
  "title": "The Growth of Functions",
  "lede": "Big-O, big-Omega, and big-Theta notation describe how fast a function grows as its input gets large — the language we use to compare the efficiency of algorithms.",
  "concepts": [
    {
      "id": "c1",
      "title": "Big-O notation and witnesses",
      "body": [
        {
          "type": "p",
          "text": "Big-O notation captures how the size of a function is bounded above by a simpler reference function for all large inputs. It lets us ignore constant factors and low-order terms and focus on the dominant rate of growth."
        },
        {
          "type": "def",
          "text": "Definition 1. Let <span class=\"sym\">f</span> and <span class=\"sym\">g</span> be functions from the integers or reals to the reals. We say <span class=\"sym\">f(x)</span> is <span class=\"sym\">O(g(x))</span> if there are constants <span class=\"sym\">C</span> and <span class=\"sym\">k</span> such that <span class=\"sym\">|f(x)| ≤ C|g(x)|</span> whenever <span class=\"sym\">x &gt; k</span>. This is read “<span class=\"sym\">f(x)</span> is big-oh of <span class=\"sym\">g(x)</span>.”"
        },
        {
          "type": "p",
          "text": "The constants <span class=\"sym\">C</span> and <span class=\"sym\">k</span> are called witnesses to the relationship. To prove <span class=\"sym\">f(x)</span> is <span class=\"sym\">O(g(x))</span> you need exhibit only one pair of witnesses — though once one pair exists, infinitely many do."
        },
        {
          "type": "p",
          "text": "Because <span class=\"sym\">g</span> is usually chosen positive for the large <span class=\"sym\">x</span> we care about, the absolute-value bars can often be dropped in practice."
        }
      ],
      "examples": [
        {
          "label": "Example 1 — a pair of witnesses",
          "body": "For <span class=\"sym\">f(x) = x² + 2x + 1</span> and <span class=\"sym\">x &gt; 1</span> we have <span class=\"sym\">x² + 2x + 1 ≤ x² + 2x² + x² = 4x²</span>, so <span class=\"sym\">C = 4, k = 1</span> are witnesses: <span class=\"sym\">f(x)</span> is <span class=\"sym\">O(x²)</span>. The choice is not unique — <span class=\"sym\">C = 3, k = 2</span> work as well."
        }
      ]
    },
    {
      "id": "c2",
      "title": "Dominant terms and what big-O hides",
      "body": [
        {
          "type": "p",
          "text": "When <span class=\"sym\">f(x)</span> is <span class=\"sym\">O(g(x))</span> and <span class=\"sym\">g</span> grows no faster than <span class=\"sym\">f</span>, we usually pick the smallest simple <span class=\"sym\">g</span> we can. A function is always big-O of any faster-growing one: <span class=\"sym\">7x²</span> is <span class=\"sym\">O(x³)</span>, but the tighter and more useful statement is <span class=\"sym\">7x²</span> is <span class=\"sym\">O(x²)</span>."
        },
        {
          "type": "p",
          "text": "The relationship is one-directional in general. <span class=\"sym\">x²</span> is not <span class=\"sym\">O(x)</span>: no constants <span class=\"sym\">C, k</span> make <span class=\"sym\">x² ≤ Cx</span> hold for all large <span class=\"sym\">x</span>, since <span class=\"sym\">x ≤ C</span> fails once <span class=\"sym\">x</span> exceeds <span class=\"sym\">C</span>."
        },
        {
          "type": "def",
          "text": "Theorem 1 (polynomials). If <span class=\"sym\">f(x) = an xⁿ + … + a1 x + a0</span> with real coefficients, then <span class=\"sym\">f(x)</span> is <span class=\"sym\">O(xⁿ)</span>. The leading term dictates the order; all lower terms are absorbed."
        },
        {
          "type": "p",
          "text": "A standard growth hierarchy, slowest to fastest, is worth memorising:"
        },
        {
          "type": "ol",
          "items": [
            "<span class=\"sym\">1</span> (constant)",
            "<span class=\"sym\">log n</span> (logarithmic)",
            "<span class=\"sym\">n</span> (linear)",
            "<span class=\"sym\">n log n</span> (linearithmic)",
            "<span class=\"sym\">n²</span> (quadratic) — and higher powers <span class=\"sym\">n³, …</span>",
            "<span class=\"sym\">2ⁿ</span> (exponential)",
            "<span class=\"sym\">n!</span> (factorial)"
          ]
        }
      ],
      "examples": [
        {
          "label": "Factimorials and logs",
          "body": "<span class=\"sym\">n! ≤ nⁿ</span> gives <span class=\"sym\">n!</span> is <span class=\"sym\">O(nⁿ)</span> with <span class=\"sym\">C = 1, k = 1</span>. Taking logarithms, <span class=\"sym\">log n! ≤ n log n</span>, so <span class=\"sym\">log n!</span> is <span class=\"sym\">O(n log n)</span>."
        }
      ]
    },
    {
      "id": "c3",
      "title": "Combining big-O estimates",
      "body": [
        {
          "type": "p",
          "text": "Two theorems let you build the big-O of a complicated expression from its pieces — the everyday toolkit for analysing algorithms."
        },
        {
          "type": "def",
          "text": "Theorem 2 (sums). If <span class=\"sym\">f1(x)</span> is <span class=\"sym\">O(g1(x))</span> and <span class=\"sym\">f2(x)</span> is <span class=\"sym\">O(g2(x))</span>, then <span class=\"sym\">(f1 + f2)(x)</span> is <span class=\"sym\">O(g(x))</span> where <span class=\"sym\">g(x) = max(|g1(x)|, |g2(x)|)</span>."
        },
        {
          "type": "def",
          "text": "Corollary 1. If <span class=\"sym\">f1</span> and <span class=\"sym\">f2</span> are both <span class=\"sym\">O(g(x))</span>, then <span class=\"sym\">(f1 + f2)(x)</span> is <span class=\"sym\">O(g(x))</span> — adding two functions of the same order keeps that order."
        },
        {
          "type": "def",
          "text": "Theorem 3 (products). If <span class=\"sym\">f1(x)</span> is <span class=\"sym\">O(g1(x))</span> and <span class=\"sym\">f2(x)</span> is <span class=\"sym\">O(g2(x))</span>, then <span class=\"sym\">(f1 f2)(x)</span> is <span class=\"sym\">O(g1(x) g2(x))</span>."
        },
        {
          "type": "p",
          "text": "Sums take the max of the parts; products multiply the parts. Together they reduce most expressions to their single dominant term."
        }
      ],
      "examples": [
        {
          "label": "Worked combination",
          "body": "For <span class=\"sym\">f(n) = 3n log(n!) + (n² + 3) log n</span>: since <span class=\"sym\">log(n!)</span> is <span class=\"sym\">O(n log n)</span> and <span class=\"sym\">3n</span> is <span class=\"sym\">O(n)</span>, Theorem 3 gives <span class=\"sym\">3n log(n!)</span> is <span class=\"sym\">O(n² log n)</span>. Also <span class=\"sym\">(n² + 3) log n</span> is <span class=\"sym\">O(n² log n)</span>. By Theorem 2, <span class=\"sym\">f(n)</span> is <span class=\"sym\">O(n² log n)</span>."
        }
      ]
    },
    {
      "id": "c4",
      "title": "Big-Omega: lower bounds",
      "body": [
        {
          "type": "p",
          "text": "Big-O gives an upper bound. To say a function grows at least as fast as a reference, we use big-Omega."
        },
        {
          "type": "def",
          "text": "Definition 2. <span class=\"sym\">f(x)</span> is <span class=\"sym\">Ω(g(x))</span> if there are positive constants <span class=\"sym\">C</span> and <span class=\"sym\">k</span> with <span class=\"sym\">|f(x)| ≥ C|g(x)|</span> whenever <span class=\"sym\">x &gt; k</span>. (<span class=\"sym\">Ω</span> is the Greek capital omega.)"
        },
        {
          "type": "p",
          "text": "There is a clean duality: <span class=\"sym\">f(x)</span> is <span class=\"sym\">Ω(g(x))</span> if and only if <span class=\"sym\">g(x)</span> is <span class=\"sym\">O(f(x))</span>. A lower bound on <span class=\"sym\">f</span> is the same statement as an upper bound on <span class=\"sym\">g</span> read the other way."
        }
      ],
      "examples": [
        {
          "label": "A lower bound",
          "body": "<span class=\"sym\">f(x) = 8x³ + 5x² + 7</span> is <span class=\"sym\">Ω(x³)</span>: <span class=\"sym\">8x³ + 5x² + 7 ≥ 8x³</span> for all <span class=\"sym\">x &gt; 0</span>, so <span class=\"sym\">C = 8, k = 0</span> are witnesses."
        }
      ]
    },
    {
      "id": "c5",
      "title": "Big-Theta: matching bounds",
      "body": [
        {
          "type": "p",
          "text": "When a function is bounded both above and below by the same reference, we have its exact order of growth."
        },
        {
          "type": "def",
          "text": "Definition 3. <span class=\"sym\">f(x)</span> is <span class=\"sym\">Θ(g(x))</span> if <span class=\"sym\">f(x)</span> is <span class=\"sym\">O(g(x))</span> and <span class=\"sym\">f(x)</span> is <span class=\"sym\">Ω(g(x))</span>. We then say <span class=\"sym\">f</span> is of order <span class=\"sym\">g</span>, or <span class=\"sym\">f</span> and <span class=\"sym\">g</span> are of the same order."
        },
        {
          "type": "p",
          "text": "Equivalently, <span class=\"sym\">f(x)</span> is <span class=\"sym\">Θ(g(x))</span> when there are constants <span class=\"sym\">C1, C2, k</span> (all positive) with <span class=\"sym\">C1|g(x)| ≤ |f(x)| ≤ C2|g(x)|</span> for <span class=\"sym\">x &gt; k</span>."
        },
        {
          "type": "def",
          "text": "Theorem 4. If <span class=\"sym\">f(x) = an xⁿ + … + a1 x + a0</span> with <span class=\"sym\">an ≠ 0</span>, then <span class=\"sym\">f(x)</span> is <span class=\"sym\">Θ(xⁿ)</span>. A polynomial is big-Theta of its leading power."
        }
      ],
      "examples": [
        {
          "label": "Sum of the first n integers",
          "body": "<span class=\"sym\">1 + 2 + … + n = n(n+1)/2</span>. It is <span class=\"sym\">O(n²)</span> (each term <span class=\"sym\">≤ n</span>, so the sum <span class=\"sym\">≤ n²</span>) and <span class=\"sym\">Ω(n²)</span> (the top half of the terms each exceed <span class=\"sym\">n/2</span>), hence <span class=\"sym\">Θ(n²)</span>."
        }
      ]
    },
    {
      "id": "c6",
      "title": "History and why it matters",
      "body": [
        {
          "type": "p",
          "text": "Big-O notation predates computing. The German mathematician Paul Bachmann introduced it in 1892 in a book on number theory; the symbol is sometimes called a Landau symbol after Edmund Landau, who used it widely."
        },
        {
          "type": "p",
          "text": "Donald Knuth popularised big-O in computer science and introduced the big-Omega and big-Theta notations used today."
        },
        {
          "type": "p",
          "text": "These notations let us compare algorithms independently of hardware: an algorithm using <span class=\"sym\">100n² + 17n + 4</span> operations is <span class=\"sym\">O(n²)</span>, so for large <span class=\"sym\">n</span> it beats one using <span class=\"sym\">n³</span> operations regardless of the machine. The growth class, not the constant, decides scalability."
        }
      ]
    }
  ],

    {

      "type": "short",
      "level": 2,
      "prompt": "Give a pair of witnesses <span class=\"sym\">C</span> and <span class=\"sym\">k</span> showing that <span class=\"sym\">f(x) = x² + 2x + 1</span> is <span class=\"sym\">O(x²)</span>, and justify them briefly.",
      "canonical": "Take C = 4 and k = 1: for x > 1, x² + 2x + 1 ≤ x² + 2x² + x² = 4x², so |f(x)| ≤ 4|x²|. (C = 3, k = 2 also work.)",
